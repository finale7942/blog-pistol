<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Illusionist — Magic Tutorial Blog</title>
  <meta name="description" content="A blog exploring the world of magic. From card magic to stage illusions, discover various magic techniques and tutorials.">
  <meta name="keywords" content="magic, illusion, card magic, magic tutorial">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪄</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Animated Background -->
  <div class="bg-magic"></div>

  <!-- Navigation -->
  <nav class="nav" id="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <span class="logo-icon">🪄</span>
        <span>Illusionist</span>
      </a>
      <div class="nav-links" id="nav-links">
        <a href="index.html" class="nav-link active">Main</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="https://github.com/finale7942" class="nav-link" target="_blank" rel="noopener">GitHub</a>
      </div>
      <button class="nav-menu-btn" id="nav-menu-btn" aria-label="Open Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <div class="hero-badge">Magic & Illusion Blog</div>
      <h1 class="hero-title">
        Unveiling the<br>
        <span class="highlight">Secrets</span> of Magic<span class="gold">.</span>
      </h1>
      <p class="hero-subtitle">
        From card magic to stage illusions,<br>
        learn the principles and techniques step by step.
      </p>
      <div class="hero-cta">
        <a href="#posts" class="btn btn-primary">Explore Posts ✦</a>
        <a href="about.html" class="btn btn-ghost">About →</a>
      </div>
    </div>
  </section>

  <!-- Posts Section -->
  <section class="section" id="posts">
    <div class="section-inner">
      <div class="section-header animate-on-scroll">
        <p class="section-label">Latest Posts</p>
        <h2 class="section-title">Recent Articles</h2>
        <div class="section-divider"></div>
      </div>

      <!-- Category Filter -->
      <div class="filter-bar" id="filter-bar"></div>

      <!-- Posts Grid -->
      <div class="posts-grid" id="posts-grid"></div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner">
      <p class="footer-text">
        © 2026 <a href="index.html">Illusionist</a>. All rights reserved.
      </p>
      <div class="footer-links">
        <a href="index.html">Main</a>
        <a href="about.html">About</a>
        <a href="https://github.com/finale7942" target="_blank" rel="noopener">GitHub</a>
      </div>
    </div>
  </footer>

  <!-- Scroll to Top -->
  <button class="scroll-top" id="scroll-top" aria-label="Scroll to Top">↑</button>

  <!-- Scripts -->
  <script src="js/posts.js"></script>
  <script src="js/main.js"></script>
  <script>
    // Initialize Home Page
    document.addEventListener('DOMContentLoaded', () => {
      initCategoryFilter();
      renderPosts('전체');
    });
  </script>
</body>
</html>
